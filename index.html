<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>古文クイズ</title>
<style>
  body {
    font-family: sans-serif;
    text-align: center;
    padding: 30px;
  }
  button {
    display: block;
    margin: 10px auto;
    padding: 10px;
    width: 250px;
    font-size: 16px;
  }
</style>
</head>
<body>

<h1>古文クイズ</h1>
<p id="category"></p>
<p id="question">読み込み中...</p>

<div id="choices"></div>

<p id="result"></p>
<p id="explanation"></p>

<button onclick="nextQuestion()">次の問題</button>

<script>
let quizData = [];
let currentQuiz = null;

// ★ あなたのCSVファイル名に合わせています
const CSV_FILE = "kobun-quiz-template_test.csv";

// CSV読み込み
fetch(CSV_FILE)
  .then(res => {
    if (!res.ok) throw new Error("CSV読み込み失敗");
    return res.text();
  })
  .then(text => {
    quizData = parseCSV(text);
    console.log("読み込みデータ:", quizData);
    nextQuestion();
  })
  .catch(err => {
    document.getElementById("question").textContent = "CSVの読み込みに失敗しました";
    console.error(err);
  });

// ★ 強化版CSVパーサ（カンマ・ダブルクォート対応）
function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",");

  return lines.slice(1).map(line => {
    const values = line.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g)
      .map(v => v.replace(/^"|"$/g, ''));

    let obj = {};
    headers.forEach((h, i) => obj[h] = values[i]);
    return obj;
  });
}

// 問題表示
function nextQuestion() {
  document.getElementById("result").textContent = "";
  document.getElementById("explanation").textContent = "";

  if (quizData.length === 0) return;

  currentQuiz = quizData[Math.floor(Math.random() * quizData.length)];

  document.getElementById("category").textContent = "【" + (currentQuiz.category || "") + "】";
  document.getElementById("question").textContent = currentQuiz.question || "問題なし";

  const choicesEl = document.getElementById("choices");
  choicesEl.innerHTML = "";

  let choices = [
    currentQuiz.choice1,
    currentQuiz.choice2,
    currentQuiz.choice3,
    currentQuiz.choice4
  ].filter(c => c); // undefined対策

  // ランダム並び替え
  choices.sort(() => Math.random() - 0.5);

  choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.onclick = () => checkAnswer(choice);
    choicesEl.appendChild(btn);
  });
}

// 判定
function checkAnswer(choice) {
  const resultEl = document.getElementById("result");
  const explanationEl = document.getElementById("explanation");

  if (choice === currentQuiz.answer) {
    resultEl.textContent = "正解！";
  } else {
    resultEl.textContent = "不正解…（正解：" + currentQuiz.answer + "）";
  }

  explanationEl.textContent = "解説：" + (currentQuiz.explanation || "");
}
</script>

</body>
</html>
