<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>古文クイズ</title>
<style>
  body {
    font-family: sans-serif;
    text-align: center;
    padding: 30px;
  }
  button {
    display: block;
    margin: 10px auto;
    padding: 10px;
    width: 250px;
  }
</style>
</head>
<body>

<h1>古文クイズ</h1>
<p id="category"></p>
<p id="question">読み込み中...</p>

<div id="choices"></div>

<p id="result"></p>
<p id="explanation"></p>

<button onclick="nextQuestion()">次の問題</button>

<script>
let quizData = [];
let currentQuiz = null;

// CSV読み込み
fetch("kobun-quiz-template_test.csv")
  .then(res => res.text())
  .then(text => {
    quizData = parseCSV(text);
    nextQuestion();
  });

// CSVパース
function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",");
  return lines.slice(1).map(line => {
    const values = line.split(",");
    let obj = {};
    headers.forEach((h, i) => obj[h] = values[i]);
    return obj;
  });
}

// 問題表示
function nextQuestion() {
  document.getElementById("result").textContent = "";
  document.getElementById("explanation").textContent = "";

  currentQuiz = quizData[Math.floor(Math.random() * quizData.length)];

  document.getElementById("category").textContent = "【" + currentQuiz.category + "】";
  document.getElementById("question").textContent = currentQuiz.question;

  const choicesEl = document.getElementById("choices");
  choicesEl.innerHTML = "";

  let choices = [
    currentQuiz.choice1,
    currentQuiz.choice2,
    currentQuiz.choice3,
    currentQuiz.choice4
  ];

  // ランダム並び替え
  choices.sort(() => Math.random() - 0.5);

  choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.onclick = () => checkAnswer(choice);
    choicesEl.appendChild(btn);
  });
}

// 判定
function checkAnswer(choice) {
  const resultEl = document.getElementById("result");
  const explanationEl = document.getElementById("explanation");

  if (choice === currentQuiz.answer) {
    resultEl.textContent = "正解！";
  } else {
    resultEl.textContent = "不正解…";
  }

  explanationEl.textContent = "解説：" + currentQuiz.explanation;
}
</script>

</body>
</html>
